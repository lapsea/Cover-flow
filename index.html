<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Coverflow Example</title>
    <meta name="description" content="A simple coverflow example using Three.js and GSAP." />
    <meta name="keywords" content="Three.js, GSAP, coverflow, 3D, JavaScript" />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.151.3/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.151.3/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <div id="container"></div>

    <!-- Coverflow navigation slider -->
    <div id="rangeSliderContainer">
      <input type="range" id="rangeSlider" min="0" max="1" step="0.01" />
    </div>

    <!-- Media player -->
    <div id="player">
      <button id="play-pause-btn" disabled>▶</button>
      <div id="player-center">
        <div id="player-title"></div>
        <div id="player-progress">
          <span id="time-current">0:00</span>
          <input type="range" id="progress-bar" min="0" max="100" step="0.1" value="0" disabled />
          <span id="time-total">0:00</span>
        </div>
      </div>
      <audio id="audio-el"></audio>
    </div>

    <!-- Gesture control -->
    <button id="gesture-toggle-btn" title="开启手势控制">🖐️</button>
    <div id="gesture-panel">
      <video id="gesture-video" autoplay playsinline muted></video>
      <canvas id="gesture-canvas"></canvas>
      <div id="gesture-label"></div>
    </div>

    <!-- Flip card overlay -->
    <div id="flip-overlay">
      <div id="flip-scene">
        <div id="flip-card-inner">
          <div id="flip-front">
            <img id="flip-cover-img" src="" alt="" />
          </div>
          <div id="flip-back">
            <div id="flip-text-content"></div>
          </div>
          <button id="flip-close">×</button>
        </div>
      </div>
    </div>
  </body>
</html>
